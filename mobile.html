<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<meta name="theme-color" content="#0c0d11" />
<title>Jupiter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0c0d11; --surface:#15171e; --surface2:#1b1e27; --line:rgba(255,255,255,.08);
    --line2:rgba(255,255,255,.14); --txt:#eef1f6; --dim:#8a93a6; --dim2:#576074;
    --mpsi:#ff2f6d; --psi:#ff8c20; --culture:#3ca6ff; --accent:#ff2f6d;
    --ok:#3fb98a;
    --sans:"Inter",system-ui,-apple-system,sans-serif; --mono:"JetBrains Mono",monospace;
    --safe-b:env(safe-area-inset-bottom,0px); --safe-t:env(safe-area-inset-top,0px);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{background:var(--bg);color:var(--txt);font-family:var(--sans);overflow-x:hidden;
    -webkit-font-smoothing:antialiased;overscroll-behavior-y:none}
  body::after{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
    background:radial-gradient(130% 70% at 50% -10%,rgba(255,47,109,.07),transparent 55%)}
  a{color:inherit;text-decoration:none}

  .top{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:12px;
    padding:calc(12px + var(--safe-t)) 16px 12px;background:rgba(12,13,17,.82);
    backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
  .top .back{width:34px;height:34px;flex:0 0 auto;display:none;align-items:center;justify-content:center;
    border:1px solid var(--line2);border-radius:9px;color:var(--dim);background:transparent}
  .top .back.on{display:flex}
  .top .back svg{width:17px;height:17px}
  .top .mk{width:6px;height:17px;border-radius:2px;background:var(--accent);flex:0 0 auto}
  .top .ttl{font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:1.4px;
    text-transform:uppercase;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .top .spacer{flex:1}
  .top .sectag{font-family:var(--mono);font-size:9.5px;letter-spacing:1px;text-transform:uppercase;
    color:var(--accent);border:1px solid var(--line2);padding:5px 9px;border-radius:7px}

  .view{display:none;padding:20px 16px calc(40px + var(--safe-b))}
  .view.on{display:block;animation:fade .3s ease both}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .eyebrow{font-family:var(--mono);font-size:9.5px;letter-spacing:2.5px;text-transform:uppercase;
    color:var(--accent);margin-bottom:9px}
  .vtitle{font-size:25px;font-weight:700;letter-spacing:.2px;margin-bottom:6px;line-height:1.2}
  .vsub{font-size:13px;color:var(--dim);line-height:1.55;margin-bottom:24px}

  .gate{min-height:70vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:0 6px}
  .gate .glogo{font-size:40px;margin-bottom:14px}
  .gate h2{font-size:22px;font-weight:700;margin-bottom:10px}
  .gate p{font-size:13px;color:var(--dim);line-height:1.6;margin-bottom:26px;max-width:330px}
  .secbtns{display:flex;flex-direction:column;gap:12px;width:100%;max-width:340px}
  .secbtn{display:flex;align-items:center;gap:14px;padding:18px;border:1px solid var(--line);
    background:var(--surface);border-radius:15px;text-align:left;cursor:pointer;transition:.16s;
    position:relative;overflow:hidden}
  .secbtn:active{transform:scale(.985)}
  .secbtn::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--c)}
  .secbtn .si{width:42px;height:42px;flex:0 0 auto;border-radius:11px;display:flex;align-items:center;
    justify-content:center;background:color-mix(in srgb,var(--c) 18%,transparent);color:var(--c)}
  .secbtn .si svg{width:21px;height:21px}
  .secbtn .sb{flex:1}
  .secbtn .sn{font-size:16px;font-weight:700;letter-spacing:.3px}
  .secbtn .sd{font-size:11.5px;color:var(--dim);margin-top:2px}
  .secbtn .sa{color:var(--dim2)}

  .list{display:flex;flex-direction:column;gap:11px}
  .item{display:flex;align-items:center;gap:14px;padding:17px 16px;border:1px solid var(--line);
    background:var(--surface);border-radius:14px;cursor:pointer;transition:.15s;position:relative;overflow:hidden}
  .item:active{transform:scale(.99);background:var(--surface2)}
  .item::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--c,var(--accent))}
  .item .ic{width:40px;height:40px;flex:0 0 auto;border-radius:11px;display:flex;align-items:center;
    justify-content:center;background:color-mix(in srgb,var(--c,var(--accent)) 16%,transparent);
    color:var(--c,var(--accent))}
  .item .ic svg{width:19px;height:19px}
  .item .bd{flex:1;min-width:0}
  .item .nm{font-size:15px;font-weight:600;letter-spacing:.2px;line-height:1.25}
  .item .mt{font-size:11px;color:var(--dim);margin-top:3px;font-family:var(--mono);letter-spacing:.2px;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .item .ar{color:var(--dim2);flex:0 0 auto}
  .item .ar svg{width:18px;height:18px}

  .grouptitle{font-family:var(--mono);font-size:9.5px;letter-spacing:2px;text-transform:uppercase;
    color:var(--dim2);margin:24px 2px 11px}
  .grouptitle:first-of-type{margin-top:6px}
  .file{display:flex;align-items:center;gap:14px;padding:15px;border:1px solid var(--line);
    background:var(--surface);border-radius:13px;cursor:pointer;margin-bottom:9px;transition:.15s}
  .file:active{transform:scale(.99);background:var(--surface2)}
  .file .ft{font-family:var(--mono);font-size:8px;letter-spacing:1px;text-transform:uppercase;
    border:1px solid var(--line2);color:var(--dim);padding:4px 7px;border-radius:6px;flex:0 0 auto;
    width:54px;text-align:center}
  .file.corr .ft{color:var(--ok);border-color:color-mix(in srgb,var(--ok) 45%,transparent)}
  .file .fn{flex:1;min-width:0;font-size:13.5px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .file .fa{color:var(--dim2);flex:0 0 auto}
  .file .fa svg{width:16px;height:16px}
  .emptybox{font-family:var(--mono);font-size:11.5px;color:var(--dim);border:1px dashed var(--line);
    border-radius:12px;padding:22px;text-align:center;line-height:1.6}

  .pdfview{position:fixed;inset:0;z-index:60;background:#000;display:none;flex-direction:column}
  .pdfview.on{display:flex}
  .pdfbar{flex:0 0 auto;display:flex;align-items:center;gap:10px;padding:calc(10px + var(--safe-t)) 14px 10px;
    background:#0a0b0e;border-bottom:1px solid var(--line)}
  .pdfbar .pn{flex:1;font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pdfbar button{width:34px;height:34px;display:flex;align-items:center;justify-content:center;
    border:1px solid var(--line2);border-radius:9px;background:transparent;color:var(--dim)}
  .pdfbar button svg{width:17px;height:17px}
  .pdfview iframe{flex:1;width:100%;border:0;background:#fff}
  .pdffallback{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:18px;padding:30px;text-align:center;color:var(--dim);font-size:13px;line-height:1.6}
  .pdffallback a{border:1px solid var(--accent);background:color-mix(in srgb,var(--accent) 16%,transparent);
    color:var(--txt);padding:13px 22px;border-radius:11px;font-weight:600;font-size:13px}

  .center{min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;gap:16px;padding:0 24px}
  .ring{width:30px;height:30px;border:2px solid var(--line2);border-top-color:var(--accent);
    border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .center p{font-size:13px;color:var(--dim);line-height:1.6}
  .center .mono{font-family:var(--mono);font-size:11px;color:var(--dim2);word-break:break-word}

  .toast{position:fixed;left:50%;bottom:calc(30px + var(--safe-b));transform:translateX(-50%);z-index:80;
    background:rgba(20,22,28,.96);border:1px solid var(--line2);color:var(--txt);font-size:12.5px;
    padding:12px 18px;border-radius:11px;backdrop-filter:blur(8px);max-width:88vw;text-align:center}
</style>
</head>
<body>

<div class="top">
  <button class="back" id="backBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg></button>
  <span class="mk"></span>
  <span class="ttl" id="topTitle">Jupiter</span>
  <span class="spacer"></span>
  <span class="sectag" id="secTag" style="display:none">—</span>
</div>

<section class="view on" id="v-gate">
  <div class="gate">
    <div class="glogo">🪐</div>
    <h2>Jupiter</h2>
    <p>Tes cours et documents, accessibles partout. Choisis une section.</p>
    <div class="secbtns" id="secBtns"></div>
  </div>
</section>

<section class="view" id="v-loading">
  <div class="center"><div class="ring"></div><p>Chargement…</p></div>
</section>

<section class="view" id="v-error">
  <div class="center">
    <p id="errMsg">Impossible de charger cette section.</p>
    <p class="mono" id="errDetail"></p>
    <button class="qbtn" style="border:1px solid var(--line2);background:var(--surface);color:var(--txt);padding:12px 22px;border-radius:11px;font-family:var(--sans);font-weight:600;cursor:pointer" id="errBack">Retour</button>
  </div>
</section>

<section class="view" id="v-subjects">
  <div class="eyebrow" id="subEyebrow">Documents</div>
  <div class="vtitle" id="subTitle">Matières</div>
  <div class="vsub" id="subSub">Choisis une matière pour accéder à ses chapitres.</div>
  <div class="list" id="subjectList"></div>
</section>

<section class="view" id="v-chapters">
  <div class="eyebrow" id="chEyebrow">Matière</div>
  <div class="vtitle">Chapitres</div>
  <div class="vsub" id="chSub">Choisis un chapitre.</div>
  <div class="list" id="chapterList"></div>
</section>

<section class="view" id="v-chapter">
  <div class="eyebrow" id="cdEyebrow">Chapitre</div>
  <div class="vtitle" id="cdTitle">—</div>
  <div class="vsub" id="cdDesc"></div>
  <div id="resGroups"></div>
</section>

<div class="pdfview" id="pdfview">
  <div class="pdfbar">
    <button id="pdfClose"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg></button>
    <span class="pn" id="pdfName">document.pdf</span>
    <button id="pdfTab" title="Ouvrir dans un onglet"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></button>
  </div>
  <div id="pdfBody" style="flex:1;display:flex;min-height:0"></div>
</div>
<script>
/* =====================================================================
   JUPITER MOBILE — lecture seule (navigation + ouverture de documents).
   Lit un manifest.json par section, hébergé sur le même site.
   Pas d'arbre 3D, pas de flash tests : volontairement léger pour mobile.
   ===================================================================== */
const $=s=>document.querySelector(s);
const esc=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

/* --- sections : où trouver chaque manifest.json (chemins relatifs) --- */
const SECTIONS=[
  {id:'MPSI',    nom:'MPSI',    desc:'Première année — programme complet', color:'#ff2f6d',
   manifest:'MPSI/manifest.json',
   icon:'<path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>'},
  {id:'PSI',     nom:'PSI',     desc:'Deuxième année', color:'#ff8c20',
   manifest:'PSI/manifest.json',
   icon:'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>'},
  {id:'Culture', nom:'Culture', desc:'Veille, lectures et notes', color:'#3ca6ff',
   manifest:'Culture/manifest.json',
   icon:'<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>'},
];

const RES_DEFS=[
  {key:'Cours',label:'Cours'},
  {key:'TD',   label:'TD'},
  {key:'DM',   label:'DM'},
  {key:'DS',   label:'DS'},
  {key:'Colle',label:'Exercices de colle'},
];
const CULTURE_DEFS=[
  {key:'Littérature'},{key:'Poésie'},{key:'Philosophie'},
  {key:'Musique'},{key:'Cinéma'},{key:'Art visuel'},
];
const ARROW='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>';
const BOOK='<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>';
const CHAP='<path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>';

/* dégradé de couleur réparti (réplique de gradientColor du PC) */
function gradientColor(i,total){
  const stops=[[255,47,109],[255,90,80],[255,140,32],[120,170,60],[60,166,255],[112,72,232]];
  const n=Math.max(total,1); const t=n===1?0:i/(n-1); const x=t*(stops.length-1);
  const lo=Math.floor(x), hi=Math.min(lo+1,stops.length-1), f=x-lo;
  const c=stops[lo].map((v,k)=>Math.round(v+(stops[hi][k]-v)*f));
  return `rgb(${c[0]},${c[1]},${c[2]})`;
}

const views={gate:$('#v-gate'),loading:$('#v-loading'),error:$('#v-error'),
  subjects:$('#v-subjects'),chapters:$('#v-chapters'),chapter:$('#v-chapter')};
let SEC=null, MAN=null, cur={subject:null,chapter:null};

function show(name){
  Object.values(views).forEach(v=>v.classList.remove('on'));
  views[name].classList.add('on');
  $('#backBtn').classList.toggle('on', name!=='gate');
  window.scrollTo(0,0);
}
function goBack(){
  if($('#pdfview').classList.contains('on')){ closePdf(); return; }
  if(views.chapter.classList.contains('on')){ show(MAN.kind==='culture'?'subjects':'chapters'); return; }
  if(views.chapters.classList.contains('on')){ show('subjects'); return; }
  show('gate');
}
$('#backBtn').onclick=goBack;
$('#errBack').onclick=()=>show('gate');

function toast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),3000);}
function setAccent(c){ document.documentElement.style.setProperty('--accent',c); }

/* --- écran de choix de section --- */
function renderGate(){
  const wrap=$('#secBtns'); wrap.innerHTML='';
  SECTIONS.forEach(s=>{
    const b=document.createElement('button'); b.className='secbtn'; b.style.setProperty('--c',s.color);
    b.innerHTML=`<span class="si"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">${s.icon}</svg></span>
      <span class="sb"><span class="sn">${esc(s.nom)}</span><span class="sd">${esc(s.desc)}</span></span>
      <span class="sa">${ARROW}</span>`;
    b.onclick=()=>loadSection(s);
    wrap.appendChild(b);
  });
}

/* --- chargement d'une section depuis son manifest --- */
async function loadSection(sec){
  SEC=sec; setAccent(sec.color);
  $('#secTag').style.display='inline-block'; $('#secTag').textContent=sec.nom;
  show('loading');
  try{
    const res=await fetch(sec.manifest,{cache:'no-cache'});
    if(!res.ok) throw new Error('HTTP '+res.status+' — '+sec.manifest);
    MAN=await res.json();
    renderSubjects();
    show('subjects');
  }catch(e){
    $('#errMsg').textContent='Impossible de charger « '+sec.nom+' ».';
    $('#errDetail').textContent=String(e.message||e)+
      '. Vérifie que '+sec.manifest+' existe en ligne (généré avec l\'outil PC).';
    show('error');
  }
}

function subjectsArr(){ return MAN.kind==='culture' ? (MAN.data.notions||[]) : (MAN.data.subjects||[]); }

function renderSubjects(){
  const culture=MAN.kind==='culture';
  $('#subEyebrow').textContent=SEC.nom;
  $('#subTitle').textContent=culture?'Notions':'Matières';
  $('#subSub').textContent=culture?'Choisis une notion.':'Choisis une matière pour accéder à ses chapitres.';
  const arr=subjectsArr();
  const list=$('#subjectList'); list.innerHTML='';
  if(!arr.length){ list.innerHTML='<div class="emptybox">Aucune matière dans cette section pour le moment.</div>'; return; }
  arr.forEach((s,i)=>{
    const col=gradientColor(i,arr.length);
    const sub=culture ? `${countFiles(s)} fiche(s)` : `${(s.chapters||[]).length} chapitre(s)`;
    list.appendChild(itemEl(col,BOOK,s.nom,sub,()=>{ cur.subject=s; openSubject(s); }));
  });
}
function countFiles(node){
  let n=0; const defs=MAN.kind==='culture'?CULTURE_DEFS:RES_DEFS;
  defs.forEach(d=>{ n+=((node.res&&node.res[d.key])||[]).length; });
  return n;
}
function itemEl(color,iconPath,name,meta,onclick){
  const el=document.createElement('div'); el.className='item'; el.style.setProperty('--c',color);
  el.innerHTML=`<span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${iconPath}</svg></span>
    <span class="bd"><span class="nm">${esc(name)}</span><span class="mt">${esc(meta)}</span></span>
    <span class="ar">${ARROW}</span>`;
  el.onclick=onclick; return el;
}

function openSubject(s){
  if(MAN.kind==='culture'){ cur.chapter=s; renderChapterDetail(); show('chapter'); return; }
  renderChapters(s); show('chapters');
}

function renderChapters(s){
  $('#chEyebrow').textContent=s.nom;
  const list=$('#chapterList'); list.innerHTML='';
  const chs=s.chapters||[];
  if(!chs.length){ list.innerHTML='<div class="emptybox">Aucun chapitre pour le moment.</div>'; return; }
  chs.forEach((c,i)=>{
    const col=gradientColor(i,chs.length);
    const nf=RES_DEFS.reduce((a,d)=>a+((c.res&&c.res[d.key])||[]).length,0);
    const meta=nf?`${nf} document${nf>1?'s':''}`:'Vide';
    list.appendChild(itemEl(col,CHAP,c.nom,meta,()=>{ cur.chapter=c; renderChapterDetail(); show('chapter'); }));
  });
}

function renderChapterDetail(){
  const c=cur.chapter, culture=MAN.kind==='culture';
  $('#cdEyebrow').textContent = culture ? SEC.nom : cur.subject.nom;
  $('#cdTitle').textContent=c.nom;
  $('#cdDesc').textContent=c.description||'';
  $('#cdDesc').style.display=c.description?'block':'none';
  const defs=culture?CULTURE_DEFS:RES_DEFS;
  const box=$('#resGroups'); box.innerHTML='';
  let any=false;
  defs.forEach(d=>{
    const files=(c.res&&c.res[d.key])||[];
    if(!files.length) return;
    any=true;
    const t=document.createElement('div'); t.className='grouptitle'; t.textContent=d.label||d.key;
    box.appendChild(t);
    files.forEach(f=>{
      const ext=(f.name.split('.').pop()||'').toUpperCase();
      const el=document.createElement('div'); el.className='file'+(f.corrige?' corr':'');
      el.innerHTML=`<span class="ft">${esc(ext)}</span><span class="fn">${esc(f.name)}</span>
        <span class="fa">${ARROW}</span>`;
      el.onclick=()=>openFile(f);
      box.appendChild(el);
    });
  });
  if(!any) box.innerHTML='<div class="emptybox">Aucun document dans ce chapitre.</div>';
}

/* --- ouverture de fichier (PDF / image) --- */
function fileUrl(f){
  const base=SEC.manifest.replace(/manifest\.json$/,'');
  return base + f.path;
}
function openFile(f){
  const url=fileUrl(f);
  const ext=(f.name.split('.').pop()||'').toLowerCase();
  $('#pdfName').textContent=f.name;
  $('#pdfTab').onclick=()=>window.open(encodeURI(url),'_blank','noopener');
  const body=$('#pdfBody');
  if(ext==='pdf'){
    body.innerHTML=`<iframe src="${encodeURI(url)}#toolbar=0&view=FitH" title="${esc(f.name)}"></iframe>`;
  } else if(['png','jpg','jpeg','gif','webp','svg'].includes(ext)){
    body.innerHTML=`<div style="flex:1;overflow:auto;display:flex;align-items:center;justify-content:center;background:#111">
      <img src="${encodeURI(url)}" style="max-width:100%;height:auto" alt="${esc(f.name)}"></div>`;
  } else {
    body.innerHTML=`<div class="pdffallback"><span>Aperçu non disponible pour ce type de fichier.</span>
      <a href="${encodeURI(url)}" target="_blank" rel="noopener">Ouvrir le fichier</a></div>`;
  }
  $('#pdfview').classList.add('on');
}
function closePdf(){ $('#pdfview').classList.remove('on'); $('#pdfBody').innerHTML=''; }
$('#pdfClose').onclick=closePdf;

window.addEventListener('popstate',()=>{ goBack(); });

renderGate();
</script>
</body>
</html>
